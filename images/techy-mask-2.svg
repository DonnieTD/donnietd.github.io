<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1440 600"
     width="100%" height="100%"
     preserveAspectRatio="none"
     style="position:absolute; inset:0; pointer-events:none;">

  <defs>

    <!-- =============================== -->
    <!-- DIAGONAL SCANLINE PATTERN       -->
    <!-- =============================== -->
    <pattern id="scanPattern"
             width="12" height="12"
             patternUnits="userSpaceOnUse"
             patternTransform="rotate(30)">

      <line x1="0" y1="0" x2="0" y2="12"
            stroke="white"
            stroke-width="2"
            stroke-opacity="0.12"/>
    </pattern>


    <!-- =============================== -->
    <!-- RADIAL FADE MASK                -->
    <!-- =============================== -->
    <radialGradient id="fieldFade"
                    cx="60%" cy="40%" r="70%">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="60%" stop-color="white" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="black" stop-opacity="0"/>
    </radialGradient>


    <!-- =============================== -->
    <!-- NOISE FOR EDGE DISTORTION       -->
    <!-- =============================== -->
    <filter id="fieldNoise">
      <feTurbulence type="fractalNoise"
                    baseFrequency="0.003"
                    numOctaves="3"
                    seed="7"
                    result="noise"/>
      <feDisplacementMap in="SourceGraphic"
                         in2="noise"
                         scale="30"
                         xChannelSelector="R"
                         yChannelSelector="G"/>
    </filter>


    <!-- =============================== -->
    <!-- GLOW EFFECT                     -->
    <!-- =============================== -->
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>


    <!-- =============================== -->
    <!-- COMPOSITE TECH MASK             -->
    <!-- =============================== -->
    <mask id="techMask" maskUnits="userSpaceOnUse">
      <rect width="1440" height="600" fill="black"/>

      <ellipse cx="900" cy="200" rx="900" ry="500"
               fill="url(#fieldFade)"
               filter="url(#fieldNoise)"/>
    </mask>

  </defs>


  <!-- =============================== -->
  <!-- FIELD LAYER (SCANLINES)         -->
  <!-- =============================== -->
  <rect width="1440" height="600"
        fill="url(#scanPattern)"
        mask="url(#techMask)"
        filter="url(#softGlow)"/>


  <!-- =============================== -->
  <!-- HARD EDGE WAVE CUT (LIKE IMAGE) -->
  <!-- =============================== -->
  <path d="
      M0 0
      H1440
      V250
      C1100 420 600 520 0 450
      Z"
        fill="black"/>

</svg>