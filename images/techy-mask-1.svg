<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1440 600"
     width="100%" height="100%"
     preserveAspectRatio="none"
     style="position:absolute; inset:0; pointer-events:none;">

  <defs>
    <!-- ===================== -->
    <!-- TECH PATTERN (Bottom) -->
    <!-- ===================== -->
    <pattern id="techPattern"
             width="340" height="340"
             patternUnits="userSpaceOnUse">

      <path d="M40 60H200V120H280"
            stroke="white"
            stroke-width="0.9"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"/>

      <path d="M100 300V200H220V80"
            stroke="white"
            stroke-width="0.9"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"/>

      <circle cx="200" cy="60" r="1.8" fill="white"/>
      <circle cx="200" cy="120" r="1.8" fill="white"/>
      <circle cx="280" cy="120" r="1.8" fill="white"/>
      <circle cx="100" cy="300" r="1.8" fill="white"/>
      <circle cx="220" cy="200" r="1.8" fill="white"/>
    </pattern>

    <mask id="techMask" maskUnits="userSpaceOnUse">
      <rect width="1440" height="600" fill="black"/>
      <rect x="0" y="360" width="1440" height="240"
            fill="url(#techPattern)"/>
    </mask>

    <!-- ===================== -->
    <!-- GLASS GRADIENT (Top)  -->
    <!-- ===================== -->
    <linearGradient id="glassGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.02"/>
    </linearGradient>

    <filter id="glassBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" />
    </filter>

  </defs>

  <!-- ===================== -->
  <!-- TECH MASK LAYER       -->
  <!-- ===================== -->
 <rect x="0" y="460" width="1440" height="240"
      fill="url(#techPattern)"/>

  <!-- ===================== -->
  <!-- GLASS BEZIER SHAPE    -->
  <!-- ===================== -->
  <g transform="scale(0.7)">
    <path d="
        M0,0
        H520
        C380,160 260,240 0,280
        Z"
          fill="url(#glassGrad)"
          filter="url(#glassBlur)"
    />

    <path d="
        M0,0
        H520
        C380,160 260,240 0,280"
          fill="none"
          stroke="white"
          stroke-opacity="0.15"
          stroke-width="1"
    />
  </g>

</svg>